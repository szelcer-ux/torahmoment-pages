name: Build Weekly Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 5"   # Fridays at 10:00 UTC

permissions:
  contents: write

jobs:
  build-weekly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run weekly digest script
        run: node tools/build-weekly-digest.mjs

      - name: Commit updated weekly file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weekly-update.json
          git diff --cached --quiet || git commit -m "Build weekly digest"
          git push
