<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All Audio Shiurim | TorahMoment</title>
  <style>
    :root{
      --bg:#f7f7f8;
      --card:#ffffff;
      --text:#111;
      --muted:#666;
      --border:#e7e7ee;
      --accent:#0d9488;
      --shadow:0 6px 22px rgba(0,0,0,0.07);
      --radius:16px;
      --wrap-max:980px;
      --wrap-pad:16px;
      --line:var(--border);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:var(--wrap-max);
      margin:0 auto;
      padding:22px var(--wrap-pad) 40px;
    }

    .hero{
      background:linear-gradient(180deg,#ffffff 0%,#fbfbfc 100%);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:20px;
      margin-bottom:18px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:.78rem;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--accent);
      margin:0 0 10px;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(1.6rem,2vw,2.1rem);
      line-height:1.15;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:.98rem;
    }

    .toolbar{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .search{
      flex:1 1 300px;
      min-width:220px;
      height:44px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:0 14px;
      font:inherit;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    .search:focus{
      border-color:#b8d9d6;
      box-shadow:0 0 0 3px rgba(13,148,136,.08);
    }

    .count{
      display:inline-flex;
      align-items:center;
      min-height:44px;
      padding:0 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      color:var(--muted);
      font-size:.95rem;
      white-space:nowrap;
    }

    .groups{
      display:grid;
      gap:18px;
    }

    .group{
      display:grid;
      gap:12px;
    }

    .group-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      padding:2px 2px 0;
    }

    .group-title{
      margin:0;
      font-size:1.05rem;
      line-height:1.2;
    }

    .group-count{
      color:var(--muted);
      font-size:.92rem;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .item{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:14px 16px;
    }

    .item-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .title{
      margin:0;
      font-size:1rem;
      line-height:1.35;
      font-weight:700;
    }

    .meta{
      margin-top:6px;
      color:var(--muted);
      font-size:.92rem;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .play-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 14px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:var(--text);
      text-decoration:none;
      font-weight:600;
      white-space:nowrap;
      transition:.15s ease;
    }

    .play-link:hover{
      transform:translateY(-1px);
      border-color:#d7dbdf;
    }

    .empty,
    .error{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      color:var(--muted);
    }

    .error{
      color:#b42318;
      font-weight:600;
    }

    .tm-topbar{
      width:100%;
      background:#ffffff;
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:1000;
    }

    .tm-topbar-inner{
      max-width:var(--wrap-max);
      margin:0 auto;
      padding:10px var(--wrap-pad);
      display:flex;
      align-items:center;
      flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      position:relative;
    }

    .tm-topbar-inner::-webkit-scrollbar{display:none}

    .tm-topbar-inner::after{
      content:"";
      position:absolute;
      right:0;
      top:0;
      width:28px;
      height:100%;
      pointer-events:none;
      background:linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,1));
    }

    .tm-topbar a,
    .tm-topbar a:visited{
      text-decoration:none;
      color:var(--muted);
      font-size:14px;
      font-weight:500;
      white-space:nowrap;
      padding:4px 10px;
    }

    .tm-topbar a:hover{
      color:var(--accent);
    }

    .tm-topbar a.active:not(.home-link),
    .tm-topbar a.active:not(.home-link):visited{
      background:rgba(13,148,136,0.12);
      color:var(--text) !important;
      font-weight:600;
      border-radius:999px;
    }

    .tm-topbar a + a{
      border-left:1px solid #e5e7eb;
      margin-left:6px;
      padding-left:12px;
    }

    .tm-topbar .home-link{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:4px 10px;
    }

    .tm-topbar .home-link svg{
      width:18px;
      height:18px;
    }

    @media (max-width:640px){
      .hero{padding:16px}
      .item{padding:13px 14px}
      .item-top{gap:10px}
      .title{font-size:.98rem}
      .meta{font-size:.88rem}
      .play-link{min-height:38px;padding:0 12px}
    }

    @media (max-width:520px){
      .tm-topbar-inner{
        padding:8px var(--wrap-pad);
      }

      .tm-topbar a,
      .tm-topbar a:visited{
        font-size:13px;
        padding:3px 8px;
      }

      .tm-topbar a + a{
        margin-left:5px;
        padding-left:10px;
      }

      .tm-topbar a[href$="/one-minute-audio.html"]{
        font-size:0;
      }

      .tm-topbar a[href$="/one-minute-audio.html"]::before{
        content:"One-Min";
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <div class="tm-topbar">
    <div class="tm-topbar-inner">
      <a href="https://torahmoment.com" aria-label="Home" class="home-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 10.5L12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
        </svg>
      </a>

      <a href="https://torahmoment.com/parsha.html">Parsha</a>
      <a href="https://torahmoment.com/halacha.html">Halacha</a>
      <a href="https://torahmoment.com/one-minute-audio.html">One Minute</a>
      <a href="https://torahmoment.com/tefilah.html">Tefila</a>
      <a href="https://torahmoment.com/mishna.html">Mishna</a>
    </div>
  </div>

  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">🎧 TorahMoment Audio Library</div>
      <h1>All Audio Shiurim</h1>
      <p class="sub">Search by title and browse all audio shiurim grouped by program.</p>

      <div class="toolbar">
        <input
          id="searchInput"
          class="search"
          type="search"
          placeholder="Search shiur title..."
          autocomplete="off"
        />
        <div class="count" id="countBox">Loading...</div>
      </div>
    </section>

    <section class="groups" id="groups"></section>
  </div>

  <script>
    const groupsEl = document.getElementById('groups');
    const searchInput = document.getElementById('searchInput');
    const countBox = document.getElementById('countBox');

    let allAudio = [];

    function normalizeText(s){
      return String(s || '').toLowerCase().trim();
    }

    function isPlayableAudio(item){
      return !!(
        item &&
        item.id &&
        item.url &&
        ['audio', 'audio-extra', 'parsha-audio', 'parsha'].includes(item.type)
      );
    }

    function formatDate(dateStr){
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function compareNewestFirst(a, b){
      const ad = new Date(a.date || 0).getTime() || 0;
      const bd = new Date(b.date || 0).getTime() || 0;
      return bd - ad;
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, ch => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[ch]));
    }

    function groupItems(items){
      const map = new Map();

      items.forEach(item => {
        const key = item.program || 'Other';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      });

      for (const arr of map.values()) {
        arr.sort(compareNewestFirst);
      }

      return Array.from(map.entries())
        .sort((a, b) => a[0].localeCompare(b[0]));
    }

    function render(items){
      countBox.textContent = `${items.length} shiur${items.length === 1 ? '' : 'im'}`;

      if (!items.length) {
        groupsEl.innerHTML = `<div class="empty">No shiurim matched your search.</div>`;
        return;
      }

      const grouped = groupItems(items);

      groupsEl.innerHTML = grouped.map(([program, arr]) => `
        <section class="group">
          <div class="group-head">
            <h2 class="group-title">${escapeHtml(program)}</h2>
            <div class="group-count">${arr.length} shiur${arr.length === 1 ? '' : 'im'}</div>
          </div>

          <div class="list">
            ${arr.map(item => {
              const meta = [formatDate(item.date)].filter(Boolean).join(' • ');
              return `
                <article class="item">
                  <div class="item-top">
                    <div>
                      <h3 class="title">${escapeHtml(item.title || 'Untitled Shiur')}</h3>
                      ${meta ? `<div class="meta">${escapeHtml(meta)}</div>` : ''}
                    </div>
                    <a class="play-link" href="/player.html?id=${encodeURIComponent(item.id)}">Play shiur</a>
                  </div>
                </article>
              `;
            }).join('')}
          </div>
        </section>
      `).join('');
    }

    function applySearch(){
      const q = normalizeText(searchInput.value);

      if (!q) {
        render(allAudio);
        return;
      }

      const filtered = allAudio.filter(item =>
        normalizeText(item.title).includes(q)
      );

      render(filtered);
    }

    async function init(){
      try {
        const res = await fetch('/data/search-index.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('Could not load search index');

        const items = await res.json();

        allAudio = items
          .filter(isPlayableAudio)
          .sort(compareNewestFirst);

        render(allAudio);

        const params = new URLSearchParams(location.search);
        const q = params.get('q') || '';
        if (q) {
          searchInput.value = q;
          applySearch();
        }
      } catch (err) {
        groupsEl.innerHTML = `<div class="error">Could not load the audio library.</div>`;
        countBox.textContent = 'Error';
      }
    }

    searchInput.addEventListener('input', applySearch);

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      const url = new URL(location.href);
      if (q) url.searchParams.set('q', q);
      else url.searchParams.delete('q');
      history.replaceState({}, '', url);
    });

    (function(){
      const links = document.querySelectorAll(".tm-topbar a[href]:not(.home-link)");
      const raw = (location.pathname || "/").replace(/\/+$/, "") || "/";
      const current = (raw === "/index.html") ? "/" : raw;

      links.forEach(a => {
        const u = new URL(a.getAttribute("href"), location.href);
        const lpRaw = (u.pathname || "/").replace(/\/+$/, "") || "/";
        const lp = (lpRaw === "/index.html") ? "/" : lpRaw;
        if (lp === current) a.classList.add("active");
      });
    })();

    init();
  </script>
</body>
</html>
